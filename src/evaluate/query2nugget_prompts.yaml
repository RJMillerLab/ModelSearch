# Step 1 only: map a user query → relevant nugget headers (no values/filters here).

query_to_nugget_headers: |
  You only do Step 1 now: select relevant headers for the user query.
  Do not add values, filters, constraints, clusters, or explanations.

  Allowed headers (exact string only):
  [[HEADERS_YAML]]

  Header meaning (must stay exactly aligned with card2nugget field guidance):
  - `Model`: the model **display name** / checkpoint identity for the row.
  - `Base_model`: upstream base only when the card/tags **explicitly** state where it comes from.
  - `Model_variant_type`: relationship to that base (`finetuned`, `quantized`, `adaptor`, `merged`).
  - `Dataset`: one unified dataset/benchmark column (train/test are merged).
  - `Metric_name`: metric label or scalar name; hyperparameters can also appear here (e.g. `num_layers`, `parameters`).
  - `Metric_value`: value paired with `Metric_name` (value-only; convert percentages to [0, 1] fractions and remove `%`; use `7B`/`32B` for very large parameter counts).

  Selection policy:
  - Default to broad recall.
  - Do not force value-level narrowing for general intents (e.g., question answering, summarization).
  - Only select headers relevant to query intent.

  Output format (NOT JSON):
  - Return plain text, one header per line.
  - Each line must be exactly one allowed header string.
  - No bullets, no numbering, no extra words.

  User query:
  [[USER_QUERY]]
