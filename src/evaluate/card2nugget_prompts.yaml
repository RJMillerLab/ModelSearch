# Single input: full Hugging Face model card (HTML / markdown / UI text). No separate local CSV tables.

nugget_schema_mapping: |
  You extract **nugget tuples** from a **Hugging Face model card** pasted below.

  The card mixes **narrative text** and **tables** (HTML `<table>`, pipe markdown, tab blocks). **Do not compress** multiple relations into one row (no long `k=v; k=v; ...` blobs in `Metric_value`, no тАЬsummaryтАЭ cells that glue many facts together). **Each distinct relation тЖТ exactly one output row.**

  **Relations from tables**
  - **Cell + row/column headers** (typical result grids): one tuple per **non-empty cell**, with the cellтАЩs **row label** and **column label** reflected in fields: usually `Model` (or row entity), `Metric` (column header / metric name), `Metric_value` (cell). If the row is not a model name, put the row label in `Model` or the most appropriate field and keep `Metric`/`Metric_value` aligned to the column.
  - **Row-oriented tables** (one table row = one primary entity, columns are attributes or scores): still output **one tuple per attribute cell**тАФrepeat the same row-entity in `Model` (or equivalent) on each tuple so the **row association** is clear. Do **not** merge an entire table row into a single tuple.
  - **Column-oriented** layouts: same ruleтАФ**one tuple per (entity, attribute, value)** pair implied by headers and cells; never fuse a whole column into one string.

  **Model тЖФ dataset (or split) relations**
  - Whenever the card states **which data** a model was trained on, fine-tuned on, or evaluated on, emit **separate tuple(s)** with `Model` + `Dataset` and/or `Train_dataset` / `Test_dataset` filled from the text (even if the same fact also appears in a table). Use `Metric` only if it helps (e.g. `trained_on`, `evaluated_on`); otherwise leave `Metric` / `Metric_value` empty for that link row.

  **Prose / bullets / YAML-like blocks**
  - One tuple per **clear, separate** fact. Multi-line YAML that describes **one** composite fact can be one tuple with fields filled consistentlyтАФstill **no** stuffing unrelated pairs into one `Metric_value`.

  **Global training hyperparameters** (epochs, batch sizes, learning rates, steps) shared across many results: **one dedicated row** with only `Model_hyperparameters` filled (other fields empty unless the card ties them to a specific model/dataset). Do not duplicate that blob into every metric tuple.

  Unknown fields: empty string. Do not invent values.

  Field guidance:
  - `Model`: checkpoint or row entity when applicable.
  - `Base_model`: parent/base if stated.
  - `Dataset` / `Train_dataset` / `Test_dataset`: benchmark or data source / split when applicable.
  - `Model_hyperparameters`: training/preproc settings.
  - `Model_variant_type`: Tiny/Base/Large/etc. if stated.
  - `Metric` / `Metric_value`: one metric name and one value per tuple (from a column header and cell, or from prose).

  MODEL CARD:
