# Single input: full Hugging Face model card (HTML / markdown / UI text).

nugget_schema_mapping: |
  Extract **nugget tuples** from the model card below into the markdown table at the end—**no other output**.

  **Global**
  - **One row = one fact** — Do not merge many relations into one cell (no long `k=v; k=v` strings in `Metric_value`). From result tables: one output row per non-empty cell; repeat the same `Model` on each row that belongs to the same table row.
  - **No extra “condition” column** — If the card mentions setup (5-shot, dev split, temperature, seed), reflect it only by choosing the right `Train_dataset` / `Test_dataset` / metric or hyperparam rows, not a new column.
  - **If the card does not state it → leave the field empty** — Do not invent ids, scores, or datasets.

  **Fields (each column: what it means → what to put → example)**

  - **`Model`** — The checkpoint’s **display name** or the row entity for this fact. **Value:** short string as on the card. **Example:** `Llama-3.1-8B-Instruct`.

  - **`Base_model`** — The **upstream** model id **only** if tags, YAML metadata, or prose **explicitly** name it (e.g. hub id “fine-tuned from …”). **Value:** hub-style id or exact name from the card; empty if not stated. **Example:** `meta-llama/Meta-Llama-3-8B`.

  - **`Base_model_type`** — How this repo relates to `Base_model` (must align with `Base_model` when both are set). **Value:** exactly one of `finetuned` | `quantized` | `distilled` | `merged`, lowercase; empty if unclear. Not model **size** (Tiny/Large). **Example:** `finetuned`.

  - **`Train_dataset`** — Data the model was **trained** or **fine-tuned / transfer-learned** on (stated for training, not the eval benchmark). **Value:** dataset or mix name/id as on the card. **Example:** `OpenOrca`.

  - **`Test_dataset`** — Data or benchmark used for **reported evaluation** when the card names it separately from training. **Value:** benchmark id or name. **Example:** `MMLU`.

  - **`Hyperparam_name`** — A **single** structural or training scalar’s **name** (architecture or training config). **Value:** snake_case or short label. **Example:** `num_layers`.

  - **`Hyperparam_value`** — The value paired with `Hyperparam_name` on the **same row**. **Value:** digits only for a plain number (no commas); otherwise a **short** normalized text if the card gives a list or range. **Example:** `32` or `2e-5`.

  - **`Metric_name`** — The **evaluation metric** label for this row. **Value:** canonical name only, no units in the string. **Example:** `f1`.

  - **`Metric_value`** — The numeric result for `Metric_name`. **Value:** ASCII number only (optional `-`, `.`, `e`); **never** `%`. If the card shows a percentage, convert to a **fraction in [0, 1]** (e.g. 92.3% → `0.923`). Count-style metrics (e.g. BLEU) stay as printed. **Example:** `0.923`.

  **Pure dataset or pure hyperparam rows** — You may leave `Metric_name` / `Metric_value` empty when the row only links model ↔ data or model ↔ hyperparam. **Shared training hparams** (epochs, batch size, lr): prefer **one** hyperparam row per name–value, not copied into every metric row.

  MODEL CARD:
  [[MODEL_CARD]]

  Return **only** this fenced markdown table:
  ```markdown
  | Model | Base_model | Base_model_type | Train_dataset | Test_dataset | Hyperparam_name | Hyperparam_value | Metric_name | Metric_value |
  | --- | --- | --- | --- | --- | --- | --- | --- | --- |
  | ... | ... | ... | ... | ... | ... | ... | ... | ... |
  ```
