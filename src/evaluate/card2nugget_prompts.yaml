nugget_schema_mapping: |
  You are extracting **atomic nugget tuples** from a Hugging Face model card.

  Inputs:
  - **TABLE PART**: raw table text. It may include irrelevant tables such as links, examples, formatting artifacts, or navigation content.
  - **TEXT PART**: the remaining narrative text.

  Goal:
  - Extract tuples about model settings, variants, datasets, metrics, and scores.
  - A **tuple is atomic**: for tables, it should usually represent **one meaningful cell value together with its aligned row header and column header**.
  - For result/performance tables, **do not summarize a whole row into one tuple** when it contains multiple useful cells. Instead, create **one tuple per valid cell**.

  Extraction rules:
  1. **Each output row = one extracted tuple.**
  2. For performance/result tables, one valid tuple is usually:
     - the **cell value**
     - plus its **row name**
     - plus its **column name**
     - plus any necessary higher-level header context.
  3. If a row has many metric cells, produce **many tuples**, one per meaningful cell.
  4. If table cell mapping is partial, still keep the tuple and leave unknown fields empty.
  5. For config/specification tables, also extract **one meaningful cell per tuple** when it describes a useful structured fact.
  6. If **TEXT PART** contains useful structured config or results, including YAML-like blocks, bullet lists, or explicit benchmark statements, you may add tuples from text. Keep them **atomic** as well.
  6.1 If TEXT PART provides **global training hyperparameters** (e.g., epochs, batch sizes, learning rates), extract them as one dedicated tuple row in `Model_hyperparameters`.
  6.2 Do not repeat the same global hyperparameter string in every performance row.
  7. Ignore clearly irrelevant tables/content, such as navigation links, toy examples, pure URLs, decorative markdown, or unrelated code snippets.
  8. Use empty string for unknown fields.
  9. Do not invent unsupported values.

  Field guidance:
  - `Model`: model or checkpoint name.
  - `Base_model`: parent/base architecture if stated.
  - `Dataset`: benchmark or dataset name when applicable.
  - `Train_dataset`: training dataset or split if explicitly known.
  - `Test_dataset`: evaluation dataset or split if explicitly known.
  - `Model_hyperparameters`: concrete config such as epochs, learning rate, batch size, layers, hidden size, parameter count, and similar settings.
  - `Model_variant_type`: variant label such as Tiny, Base, Large, multilingual, distilled, quantized, finetuned, and similar categories.
  - `Metric`: metric or attribute name implied by the cell, header, or context.
  - `Metric_value`: the extracted cell value.
  Important:
  - Prefer **more atomic rows** over fewer aggregated rows.
  - Example: if row = `BERT-Tiny`, column = `SST-2`, value = `83.2`, that should be **one tuple**.
  - Another cell in the same row, such as `MNLI = 70.2`, should usually be **another tuple**.

  TABLE PART:
  [[TABLE_CONTEXT]]

  TEXT PART:
  [[CARD_REMAINING]]

  Please return the response in the following format, and do not return anything else:
  ```markdown
  | Model | Base_model | Dataset | Train_dataset | Test_dataset | Model_hyperparameters | Model_variant_type | Metric | Metric_value |
  | --- | --- | --- | --- | --- | --- | --- | --- | --- |
  | ... | ... | ... | ... | ... | ... | ... | ... | ... |
  ```

nugget_schema_mapping_text_only: |
  You are extracting **atomic nugget tuples** from a Hugging Face model card.

  Inputs:
  - TABLE PART: unavailable or empty for this sample.
  - TEXT PART: the only source of facts.

  Goal:
  - Extract tuples about model settings, variants, datasets, metrics, and scores from TEXT PART only.
  - Keep tuples atomic and grounded in explicit text evidence.
  - Filter out weak, decorative, or unsupported statements.

  Text-only extraction rules:
  1. Each output row = one extracted tuple.
  2. You may extract from prose, bullets, and yaml-like / config-like blocks.
  3. If one logical tuple is written across multiple lines (for example yaml-like key/value lines), merge those lines into one tuple.
  4. If multiple metrics are listed, output multiple tuples (one metric/value per row when possible).
  5. Use empty string for unknown fields.
  6. Do not invent values not present in text.
  7. If text contains global hyperparameters (epochs, batch sizes, learning rates), extract them into `Model_hyperparameters`.

  Field guidance:
  - `Model`: model or checkpoint name.
  - `Base_model`: parent/base architecture if stated.
  - `Dataset`: benchmark or dataset name.
  - `Train_dataset`: training dataset/split if explicit.
  - `Test_dataset`: evaluation dataset/split if explicit.
  - `Model_hyperparameters`: explicit settings such as epochs, lr, batch size, layers, hidden size, params.
  - `Model_variant_type`: Tiny/Base/Large/distilled/quantized/finetuned/etc.
  - `Metric`: metric name.
  - `Metric_value`: metric value.

  TEXT PART:
  [[CARD_REMAINING]]

  Please return the response in the following format, and do not return anything else:
  ```markdown
  | Model | Base_model | Dataset | Train_dataset | Test_dataset | Model_hyperparameters | Model_variant_type | Metric | Metric_value |
  | --- | --- | --- | --- | --- | --- | --- | --- | --- |
  | ... | ... | ... | ... | ... | ... | ... | ... | ... |
  ```