# Single input: full Hugging Face model card (HTML / markdown / UI text).

nugget_schema_mapping: |
  Extract nugget rows from the model card into the markdown table at the end. Return **only** the table.

  TARGET MODEL ID (only extract rows for this repo id):
  [[TARGET_MODEL_ID]]

  Global rules:
  - One row = one fact. Do not merge multiple facts into one row.
  - Each relationship must be a separate nugget row. Example: (`Model`, `Dataset`, `Metric_name`, `Metric_value`) is one nugget; (`Model`, `Base_model`, `Model_variant_type`) is a different nugget row.
  - If a leaderboard table contains many models, keep only rows that correspond to TARGET MODEL ID. Ignore other models.
  - If a value is not explicitly stated in the card, leave it empty.
  - No extra columns, no commentary, no JSON.

  Columns:
  - `Model`: row entity / model display name.
  - `Base_model`: upstream model id only if explicitly stated in tags/YAML/prose (same behavior as before).
  - `Model_variant_type`: one of `finetuned` | `quantized` | `adaptor` | `merged` (lowercase), else empty.
  - `Dataset`: dataset or benchmark name for this fact. Since train/test is not required, use a single dataset column.
  - `Metric_name`: expanded metric or scalar name only. No abbreviations.
    - Write full names: `accuracy` (not `acc`), `precision` (not `prec`), `recall`, `f1`, `pass@1`, `num_layers`, `parameters`, etc.
    - Hyperparameters are also allowed in `Metric_name` (for example `num_layers`, `learning_rate`, `parameters`).
  - `Metric_value`: value paired with `Metric_name`.
    - Must be value-only, not prose, with no extra text.
    - If value is percentage, convert to fraction in [0, 1] and remove `%` (for example `92.3%` -> `0.923`).
    - For parameter counts, use unit form only for very large values (for example `7B`, `32B`).
    - For normal scalar counts, keep plain numeric form (for example `32`, `4096`, `2e-5`).
    - Never put metric names in `Metric_value`.

  MODEL CARD:
  [[MODEL_CARD]]

  Return exactly this fenced markdown table format:
  ```markdown
  | Model | Base_model | Model_variant_type | Dataset | Metric_name | Metric_value |
  | --- | --- | --- | --- | --- | --- |
  | ... | ... | ... | ... | ... | ... |
  ```
